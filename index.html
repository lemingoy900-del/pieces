<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Карточная Игра (P2P)</title>
    <script src="https://unpkg.com/peerjs@1.5.4/dist/peerjs.min.js"></script>
    <style>
        body { 
            margin: 0; 
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #2c3e50; 
            color: white;
            overflow: hidden;
            height: 100vh;
        }
        #ui {
            position: fixed;
            top: 20px;
            left: 20px;
            background: rgba(0,0,0,0.7);
            padding: 20px;
            border-radius: 10px;
            z-index: 1000;
            min-width: 300px;
        }
        input, button {
            padding: 10px;
            margin: 5px 0;
            width: 100%;
            box-sizing: border-box;
            border-radius: 5px;
            border: 1px solid #555;
            background: #34495e;
            color: white;
        }
        button {
            background: #27ae60;
            cursor: pointer;
            border: none;
            font-weight: bold;
        }
        button:hover { background: #2ecc71; }
        button:disabled { background: #555; cursor: not-allowed; }
        
        #status { margin-top: 10px; font-size: 14px; color: #f1c40f; }
        
        .cursor {
            position: absolute;
            width: 20px;
            height: 20px;
            border-radius: 50%;
            pointer-events: none;
            transition: transform 0.1s linear;
            border: 2px solid white;
            z-index: 999;
        }
        
        .cursor-label {
            position: absolute;
            font-size: 12px;
            background: rgba(0,0,0,0.5);
            padding: 2px 5px;
            border-radius: 3px;
            top: -20px;
            left: 0;
            white-space: nowrap;
        }

        #game-area {
            width: 100vw;
            height: 100vh;
            position: relative;
        }
        
        .hidden { display: none !important; }
    </style>
</head>
<body>

<div id="ui">
    <h2>🎴 Карточная Игра</h2>
    <div id="menu">
        <p><strong>Хост:</strong></p>
        <button id="btn-create">Создать комнату</button>
        
        <p style="margin-top: 15px;"><strong>Игрок:</strong></p>
        <input type="text" id="room-id" placeholder="Введите ID комнаты">
        <button id="btn-join">Присоединиться</button>
    </div>

    <div id="room-info" class="hidden">
        <p><strong>ID комнаты:</strong> <span id="my-id" style="color: #2ecc71; font-family: monospace;"></span></p>
        <p style="font-size: 12px; color: #bbb;">Отправьте этот ID другу, чтобы он подключился.</p>
        <p><strong>Статус:</strong> <span id="status">Ожидание...</span></p>
        <button id="btn-disconnect" style="background: #c0392b;">Выйти</button>
    </div>
</div>

<div id="game-area"></div>

<script>
    let peer = null;
    let connections = []; // Храним все активные соединения
    let myColor = '#' + Math.floor(Math.random()*16777215).toString(16);
    let isHost = false;

    const uiMenu = document.getElementById('menu');
    const uiRoomInfo = document.getElementById('room-info');
    const myIdSpan = document.getElementById('my-id');
    const statusSpan = document.getElementById('status');
    const gameArea = document.getElementById('game-area');

    // Генерация короткого ID для комнаты
    function generateRoomId() {
        return Math.random().toString(36).substring(2, 8).toUpperCase();
    }

    // ═══════════════════════════════════════════════════════
    // СОЗДАНИЕ КОМНАТЫ (ХОСТ)
    // ═══════════════════════════════════════════════════════
    document.getElementById('btn-create').onclick = () => {
        isHost = true;
        const roomId = generateRoomId();
        initPeer(roomId);
    };

    // ═══════════════════════════════════════════════════════
    // ПРИСОЕДИНЕНИЕ (КЛИЕНТ)
    // ═══════════════════════════════════════════════════════
    document.getElementById('btn-join').onclick = () => {
        const roomId = document.getElementById('room-id').value.trim().toUpperCase();
        if (!roomId) return alert('Введите ID комнаты');
        isHost = false;
        initPeer(null, roomId);
    };

    document.getElementById('btn-disconnect').onclick = () => {
        location.reload();
    };

    // ═══════════════════════════════════════════════════════
    // ИНИЦИАЛИЗАЦИЯ PEERJS
    // ═══════════════════════════════════════════════════════
    function initPeer(asHost, connectTo) {
        // Если мы хост, то создаем Peer с заданным ID.
        // Если клиент, то создаем Peer со случайным ID.
        const peerId = asHost ? asHost : undefined;
        
        peer = new Peer(peerId);

        peer.on('open', (id) => {
            uiMenu.classList.add('hidden');
            uiRoomInfo.classList.remove('hidden');
            myIdSpan.textContent = id;
            statusSpan.textContent = 'Ожидание игроков...';

            if (connectTo) {
                statusSpan.textContent = 'Подключение...';
                connectToPeer(connectTo);
            }
        });

        // Обработка входящих соединений (для Хоста)
        peer.on('connection', (conn) => {
            handleConnection(conn);
        });

        peer.on('error', (err) => {
            console.error('PeerJS error:', err);
            statusSpan.textContent = 'Ошибка: ' + err.type;
            if (err.type === 'unavailable-id') {
                alert('Этот ID уже занят. Попробуйте снова.');
                location.reload();
            } else if (err.type === 'peer-unavailable') {
                alert('Комната не найдена. Проверьте ID.');
                location.reload();
            }
        });
    }

    function connectToPeer(targetId) {
        const conn = peer.connect(targetId, { reliable: true });
        handleConnection(conn);
    }

    // ═══════════════════════════════════════════════════════
    // ОБРАБОТКА СОЕДИНЕНИЙ
    // ═══════════════════════════════════════════════════════
    function handleConnection(conn) {
        conn.on('open', () => {
            connections.push(conn);
            statusSpan.textContent = `Подключено игроков: ${connections.length}`;
            
            // Отправляем приветственный пакет с нашим цветом
            sendTo(conn, { type: 'hello', color: myColor });
        });

        conn.on('data', (data) => {
            handleMessage(conn, data);
        });

        conn.on('close', () => {
            connections = connections.filter(c => c !== conn);
            statusSpan.textContent = `Подключено игроков: ${connections.length}`;
            // Удаляем курсор игрока
            const cursorEl = document.getElementById('cursor-' + conn.peer);
            if (cursorEl) cursorEl.remove();
        });
    }

    // ═══════════════════════════════════════════════════════
    // ОБРАБОТКА СООБЩЕНИЙ
    // ═══════════════════════════════════════════════════════
    function handleMessage(conn, data) {
        // console.log('Received:', data);
        
        if (data.type === 'hello') {
            createCursor(conn.peer, data.color);
        } 
        else if (data.type === 'cursor') {
            updateCursor(conn.peer, data.x, data.y);
        }
        else if (data.type === 'chat') {
            console.log(`[Chat] ${data.text}`);
        }
    }

    // Отправка данных конкретному пиру
    function sendTo(conn, data) {
        if (conn && conn.open) conn.send(data);
    }

    // Broadcast всем подключенным
    function broadcast(data) {
        connections.forEach(conn => {
            if (conn.open) conn.send(data);
        });
    }

    // ═══════════════════════════════════════════════════════
    // КУРСОРЫ (демонстрация синхронизации)
    // ═══════════════════════════════════════════════════════
    function createCursor(id, color) {
        const el = document.createElement('div');
        el.className = 'cursor';
        el.id = 'cursor-' + id;
        el.style.backgroundColor = color;
        el.innerHTML = `<div class="cursor-label">Player</div>`;
        document.body.appendChild(el);
    }

    function updateCursor(id, x, y) {
        const el = document.getElementById('cursor-' + id);
        if (el) {
            el.style.transform = `translate(${x}px, ${y}px)`;
        }
    }

    // Отправка своего курсора
    document.addEventListener('mousemove', (e) => {
        if (connections.length > 0) {
            broadcast({ type: 'cursor', x: e.clientX, y: e.clientY });
        }
    });

</script>
</body>
</html>
