<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Кооперативные Пазлы</title>
    <script src="https://unpkg.com/peerjs@1.5.4/dist/peerjs.min.js"></script>
    <style>
        * { user-select: none; -webkit-user-drag: none; box-sizing: border-box; }

        body {
            margin: 0; overflow: hidden; font-family: 'Segoe UI', Tahoma, sans-serif; color: #ecf0f1;
            background-image: url('wood.jpg'); background-repeat: repeat; 
            background-color: #3e2723; 
        }

        #table-wrapper { position: absolute; top: 0; left: 0; right: 0; bottom: 0; overflow: hidden; cursor: grab; }
        #table-wrapper:active { cursor: grabbing; }
        #table { position: absolute; width: 4000px; height: 4000px; transform-origin: 0 0; }

        #guide { position: absolute; opacity: 0.15; pointer-events: none; border: 2px dashed #a1887f; z-index: 1; }

        .piece { position: absolute; cursor: pointer; z-index: 10; filter: drop-shadow(2px 2px 3px rgba(0,0,0,0.5)); touch-action: none; }
        .piece.dragging { filter: drop-shadow(6px 6px 8px rgba(0,0,0,0.8)); z-index: 9999 !important; }

        .remote-cursor {
            position: absolute; width: 14px; height: 14px; border-radius: 50%; pointer-events: none; z-index: 100000;
            transform: translate(-50%, -50%); box-shadow: 0 0 0 2px #ffffff, 0 2px 5px rgba(0,0,0,0.5);
            transition: left 0.05s linear, top 0.05s linear;
        }

        #ui-panel {
            background: rgba(27, 18, 14, 0.95); border-radius: 12px; z-index: 10000;
            border: 2px solid #8d6e63; box-shadow: 0 10px 30px rgba(0,0,0,0.6); transition: all 0.4s ease;
        }
        #ui-panel.waiting { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 380px; padding: 30px; text-align: center; }
        #ui-panel.playing { position: absolute; top: 15px; left: 15px; width: 280px; padding: 15px; }

        h2 { margin: 0 0 10px 0; font-size: 18px; color: #d7ccc8; }
        .control-group { margin-bottom: 15px; display: flex; justify-content: center; gap: 15px;}
        label { display: block; font-size: 14px; margin-bottom: 5px; }
        
        input[type="number"], input[type="text"] { 
            background: #3e2723; color: white; border: 1px solid #795548; padding: 6px; border-radius: 4px; text-align: center;
        }
        input[type="text"] { width: 100%; margin-bottom: 15px; }
        input[type="number"] { width: 50px; }
        
        .file-upload-btn {
            display: inline-block; background: #5d4037; border: 1px solid #795548; color: #fff;
            padding: 10px 15px; border-radius: 6px; cursor: pointer; width: 100%; margin-bottom: 5px; transition: background 0.2s;
        }
        .file-upload-btn:hover { background: #6d4c41; }
        #file-name { font-size: 12px; color: #bcaaa4; margin-bottom: 15px; word-break: break-all; }

        button { background: #4caf50; color: white; border: none; padding: 10px 15px; border-radius: 6px; cursor: pointer; width: 100%; font-weight: bold; transition: 0.2s;}
        button:hover { background: #45a049; }
        
        .host-btn { background: #2980b9; margin-bottom: 15px; }
        .host-btn:hover { background: #2471a3; }
        
        #status { margin-top: 10px; font-size: 12px; color: #8bc34a; }
        #room-badge { display: none; margin-bottom: 15px; padding: 10px; background: #2c3e50; border-radius: 4px; font-size: 14px; border: 1px dashed #7f8c8d;}
    </style>
</head>
<body>

    <div id="table-wrapper">
        <div id="table">
            <img id="guide">
        </div>
    </div>
    
    <div id="ui-panel" class="waiting">
        <h2>КООПЕРАТИВНЫЕ ПАЗЛЫ</h2>
        <div id="status">👋 Выберите режим игры:</div>
        
        <div id="room-badge">ID вашей комнаты:<br><strong id="current-room-name" style="color: #f1c40f; font-size: 18px;"></strong></div>
        
        <div id="room-section" style="margin-top: 20px;">
            <button class="host-btn" onclick="createRoom()">🏠 Создать комнату (Стать Хостом)</button>
            <div style="border-top: 1px solid #555; margin: 10px 0; padding-top: 15px;">
                <input type="text" id="roomIdInput" placeholder="Введите ID комнаты друга">
                <button onclick="joinRoom()">🔌 Войти</button>
            </div>
        </div>

        <div id="setup-section" style="display: none;">
            <hr style="border-color:#555; margin:15px 0;">
            <div style="font-size: 12px; color: #aaa; margin-bottom: 10px;">Ждите, пока друзья подключатся, затем выберите картинку.</div>
            
            <label for="imageInput" class="file-upload-btn">🖼️ Выбрать изображение</label>
            <input type="file" id="imageInput" accept="image/*" style="display: none;">
            <div id="file-name">Файл не выбран</div>

            <div style="margin-bottom: 15px; display: flex; justify-content: center;">
                <label style="display: flex; align-items: center; gap: 8px; cursor: pointer;">
                    <input type="checkbox" id="showGuide" checked style="width: auto;">
                    Показывать подсказку на фоне
                </label>
            </div>

            <div class="control-group">
                <label>Колонки: <input type="number" id="cols" value="6" min="2"></label>
                <label>Строки: <input type="number" id="rows" value="4" min="2"></label>
            </div>
            <button onclick="startGame()">Нарезать и начать</button>
        </div>
        
        <div id="playing-section" style="display: none; margin-top: 15px;">
            <button id="resetBtn" onclick="resetGame()" style="background:#b71c1c;">Завершить игру</button>
        </div>
    </div>

    <script>
        // СЕТЕВЫЕ ПЕРЕМЕННЫЕ P2P
        let peer = null;
        let isHost = false;
        let hostConnection = null;       // Соединение гостя с хостом
        let clientConnections = [];      // Массив соединений хоста с гостями
        
        const myClientId = Math.random().toString(36).substring(2, 9);
        const colors = ['#e74c3c', '#2ecc71', '#3498db', '#f1c40f', '#9b59b6', '#1abc9c', '#e67e22', '#e84393', '#00d2d3'];
        const myColor = colors[Math.floor(Math.random() * colors.length)];

        // ИГРОВЫЕ ПЕРЕМЕННЫЕ
        let gameState = { status: 'waiting', pieces: {}, tabs: {h:[], v:[]}, showGuide: true };
        let cachedImage = new Image();
        let currentRoomId = null; 
        
        let draggingGroup = null;
        let isPanning = false;
        let tableX = 0, tableY = 0;
        let dragStartX = 0, dragStartY = 0;
        let initialPiecePositions = {}; 
        let lastSendTime = 0;
        let lastCursorSend = 0; 

        // АУДИО
        let audioCtx = null;
        function initAudio() { if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)(); }

        function playPickSound() {
            initAudio(); const ctx = audioCtx; const osc = ctx.createOscillator(); const gain = ctx.createGain();
            osc.connect(gain); gain.connect(ctx.destination);
            osc.type = 'sine'; osc.frequency.setValueAtTime(550, ctx.currentTime); osc.frequency.exponentialRampToValueAtTime(300, ctx.currentTime + 0.04);
            gain.gain.setValueAtTime(0.08, ctx.currentTime); gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.04);
            osc.start(); osc.stop(ctx.currentTime + 0.04);
        }

        function playSnapSound() {
            initAudio(); const ctx = audioCtx; const osc = ctx.createOscillator(); const gain = ctx.createGain();
            osc.connect(gain); gain.connect(ctx.destination);
            osc.type = 'triangle'; osc.frequency.setValueAtTime(160, ctx.currentTime); osc.frequency.exponentialRampToValueAtTime(70, ctx.currentTime + 0.08);
            gain.gain.setValueAtTime(0.3, ctx.currentTime); gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.08);
            osc.start(); osc.stop(ctx.currentTime + 0.08);
        }

        function playWinSound() {
            initAudio(); const ctx = audioCtx; const notes = [523.25, 659.25, 783.99, 1046.50];
            notes.forEach((freq, index) => {
                const osc = ctx.createOscillator(); const gain = ctx.createGain();
                osc.connect(gain); gain.connect(ctx.destination);
                osc.type = 'sine'; osc.frequency.setValueAtTime(freq, ctx.currentTime + index * 0.08);
                gain.gain.setValueAtTime(0.1, ctx.currentTime + index * 0.08); gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + index * 0.08 + 0.4);
                osc.start(ctx.currentTime + index * 0.08); osc.stop(ctx.currentTime + index * 0.08 + 0.4);
            });
        }

        document.getElementById('imageInput').addEventListener('change', function() {
            const name = this.files[0] ? this.files[0].name : 'Файл не выбран';
            document.getElementById('file-name').textContent = name;
        });

        // ═══════════════════════════════════════════════════════════
        // P2P СЕТЬ: ИНИЦИАЛИЗАЦИЯ ХОСТА И ГОСТЕЙ
        // ═══════════════════════════════════════════════════════════

        function createRoom() {
    isHost = true;
    document.getElementById('status').innerHTML = 'Создание комнаты...';
    document.getElementById('room-section').style.display = 'none';
    
    // PeerJS сам создаст уникальный ID, если не передавать аргументов
    peer = new Peer(); 
    
    peer.on('open', (id) => {
        // id теперь — это длинная случайная строка, которую сгенерировал сервер PeerJS
        currentRoomId = id; 
        
        document.getElementById('status').innerHTML = '🟢 Комната активна! Ожидание игроков...';
        document.getElementById('room-badge').style.display = 'block';
        
        // Отображаем ID, чтобы хост мог скопировать его другу
        document.getElementById('current-room-name').textContent = currentRoomId;
        document.getElementById('setup-section').style.display = 'block';
    });

    peer.on('connection', (conn) => {
        // ... (остальной код функции остается без изменений)
        clientConnections.push(conn);
        conn.guestId = Math.random().toString(36).substring(2, 9);
        conn.guestColor = colors[Math.floor(Math.random() * colors.length)];
        conn.send({ type: 'fullState', state: gameState });
        
        conn.on('data', (data) => {
            handleHostMessage(conn.guestId, conn.guestColor, data);
        });
        
        conn.on('close', () => {
            clientConnections = clientConnections.filter(c => c !== conn);
            broadcastExcept(null, { type: 'cursorRemove', id: conn.guestId });
            const cursorEl = document.getElementById('cursor-' + conn.guestId);
            if (cursorEl) cursorEl.remove();
        });
    });

    peer.on('error', (err) => {
        alert('Ошибка PeerJS: ' + err.type);
        location.reload();
    });
}

        function joinRoom() {
            const id = document.getElementById('roomIdInput').value.trim();
            if (!id) return alert('Введите ID комнаты!');
            
            isHost = false;
            document.getElementById('status').innerHTML = 'Подключение к хосту...';
            document.getElementById('room-section').style.display = 'none';
            
            peer = new Peer();
            
            peer.on('open', () => {
                hostConnection = peer.connect('puzzlegame-' + id);
                
                hostConnection.on('open', () => {
                    currentRoomId = id;
                    document.getElementById('status').innerHTML = '🟢 Успешно! Ожидайте запуска игры хостом.';
                    document.getElementById('room-badge').style.display = 'block';
                    document.getElementById('current-room-name').textContent = currentRoomId;
                    document.getElementById('resetBtn').style.display = 'none'; // Гость не может завершать игру
                });
                
                hostConnection.on('data', (msg) => {
                    handleClientMessage(msg);
                });
                
                hostConnection.on('close', () => {
                    document.getElementById('status').innerHTML = '🔴 Связь с хостом потеряна.';
                    setTimeout(() => { location.reload(); }, 3000);
                });
            });

            peer.on('error', (err) => {
                alert('Комната не найдена или недоступна!');
                location.reload();
            });
        }

        // Универсальная отправка данных
        function send(msg) {
            if (isHost) {
                // Если хост делает действие - обрабатываем на месте и рассылаем
                handleHostMessage('host', myColor, msg);
            } else {
                // Если гость - шлем хосту
                if (hostConnection && hostConnection.open) hostConnection.send(msg);
            }
        }

        function broadcastExcept(exceptId, message) {
            clientConnections.forEach(conn => {
                if (conn.open && conn.guestId !== exceptId) conn.send(message);
            });
        }

        // ═══════════════════════════════════════════════════════════
        // ОБРАБОТКА ДАННЫХ (БЫВШИЙ SERVER.JS)
        // ═══════════════════════════════════════════════════════════

        // Логика Хоста (мастер-стейт)
        function handleHostMessage(senderId, senderColor, msg) {
            if (msg.type === 'initGame') {
                gameState.status = 'playing';
                gameState.image = msg.image; gameState.width = msg.width; gameState.height = msg.height;
                gameState.cols = msg.cols; gameState.rows = msg.rows;
                gameState.pieces = msg.pieces; gameState.tabs = msg.tabs; gameState.showGuide = msg.showGuide;
                
                processStateUpdate(gameState);
                broadcastExcept(null, { type: 'fullState', state: gameState });
            } 
            else if (msg.type === 'updatePieces') {
                msg.pieces.forEach(p => {
                    if (gameState.pieces[p.id]) {
                        gameState.pieces[p.id].x = p.x; gameState.pieces[p.id].y = p.y; gameState.pieces[p.id].group = p.group;
                    }
                });

                if (senderId !== 'host') {
                    let remoteSnapped = false;
                    msg.pieces.forEach(p => {
                        if (draggingGroup !== p.group) {
                            if (gameState.pieces[p.id] && gameState.pieces[p.id].group !== p.group) remoteSnapped = true;
                            gameState.pieces[p.id] = p; updatePieceDOM(p.id);
                        }
                    });
                    if (remoteSnapped) playSnapSound();
                }

                broadcastExcept(senderId, { type: 'piecesUpdate', pieces: msg.pieces });
            }
            else if (msg.type === 'resetGame') {
                gameState = { status: 'waiting', pieces: {}, tabs: {h:[], v:[]}, showGuide: true };
                processStateUpdate(gameState);
                broadcastExcept(null, { type: 'fullState', state: gameState });
            }
            else if (msg.type === 'cursorMove') {
                broadcastExcept(senderId, { type: 'cursorUpdate', id: senderId, color: senderColor, x: msg.x, y: msg.y });
                if (senderId !== 'host') updateRemoteCursor(senderId, senderColor, msg.x, msg.y);
            }
        }

        // Логика Гостя (подчиненный стейт)
        function handleClientMessage(msg) {
            if (msg.type === 'fullState') {
                processStateUpdate(msg.state);
            } 
            else if (msg.type === 'piecesUpdate') {
                let remoteSnapped = false;
                msg.pieces.forEach(p => {
                    if (draggingGroup !== p.group) {
                        if (gameState.pieces[p.id] && gameState.pieces[p.id].group !== p.group) remoteSnapped = true;
                        gameState.pieces[p.id] = p; updatePieceDOM(p.id);
                    }
                });
                if (remoteSnapped) playSnapSound();
            }
            else if (msg.type === 'cursorUpdate') {
                updateRemoteCursor(msg.id, msg.color, msg.x, msg.y);
            } 
            else if (msg.type === 'cursorRemove') {
                const cursorEl = document.getElementById('cursor-' + msg.id);
                if (cursorEl) cursorEl.remove();
            }
        }

        function updateRemoteCursor(id, color, x, y) {
            let cursorEl = document.getElementById('cursor-' + id);
            if (!cursorEl) {
                cursorEl = document.createElement('div'); cursorEl.id = 'cursor-' + id;
                cursorEl.className = 'remote-cursor'; cursorEl.style.backgroundColor = color;
                document.getElementById('table').appendChild(cursorEl);
            }
            cursorEl.style.left = x + 'px'; cursorEl.style.top = y + 'px';
        }

        // ═══════════════════════════════════════════════════════════
        // ИГРОВАЯ МЕХАНИКА И РЕНДЕР
        // ═══════════════════════════════════════════════════════════

        function startGame() {
            if (!currentRoomId || !isHost) return;
            const file = document.getElementById('imageInput').files[0];
            if (!file) return alert('Выберите картинку!');
            
            const cols = parseInt(document.getElementById('cols').value);
            const rows = parseInt(document.getElementById('rows').value);
            const showGuide = document.getElementById('showGuide').checked; 
            
            const reader = new FileReader();
            reader.onload = (e) => {
                const img = new Image();
                img.onload = () => {
                    const canvas = document.createElement('canvas');
                    let w = img.width, h = img.height;
                    const maxW = 1200, maxH = 800;
                    if (w > maxW || h > maxH) {
                        const ratio = Math.min(maxW / w, maxH / h);
                        w = Math.floor(w * ratio); h = Math.floor(h * ratio);
                    }
                    canvas.width = w; canvas.height = h;
                    canvas.getContext('2d').drawImage(img, 0, 0, w, h);
                    const imageBase64 = canvas.toDataURL('image/jpeg', 0.85);
                    
                    const tabs = { h: [], v: [] };
                    for(let r=0; r<rows-1; r++) { tabs.h[r] = []; for(let c=0; c<cols; c++) tabs.h[r].push(Math.random() > 0.5 ? 1 : -1); }
                    for(let r=0; r<rows; r++) { tabs.v[r] = []; for(let c=0; c<cols-1; c++) tabs.v[r].push(Math.random() > 0.5 ? 1 : -1); }

                    const initialPieces = {};
                    let idCount = 0;
                    const startX = 2000 - w/2; const startY = 2000 + h/2 + 50; 
                    for(let r = 0; r < rows; r++) {
                        for(let c = 0; c < cols; c++) {
                            initialPieces[idCount] = { id: idCount, c: c, r: r, group: idCount, x: startX - 200 + Math.random() * (w + 400), y: startY + Math.random() * 600 };
                            idCount++;
                        }
                    }
                    
                    send({
                        type: 'initGame', image: imageBase64, width: w, height: h, 
                        cols: cols, rows: rows, pieces: initialPieces, tabs: tabs, showGuide: showGuide
                    });
                };
                img.src = e.target.result;
            };
            reader.readAsDataURL(file);
        }

        function resetGame() { if(isHost) send({ type: 'resetGame' }); }

        function processStateUpdate(state) {
            gameState = state;
            if (gameState.status === 'playing') {
                cachedImage.onload = () => renderFullState();
                cachedImage.src = gameState.image;
            } else {
                renderFullState();
            }
        }

        function renderFullState() {
            const panel = document.getElementById('ui-panel');
            const guide = document.getElementById('guide');
            
            if (gameState.status === 'playing') {
                panel.className = 'playing';
                document.getElementById('setup-section').style.display = 'none';
                document.getElementById('playing-section').style.display = 'block';
                document.getElementById('room-section').style.display = 'none';
                document.getElementById('room-badge').style.display = 'none';
                
                tableX = window.innerWidth / 2 - 2000; tableY = window.innerHeight / 2 - 2000;
                document.getElementById('table').style.transform = `translate(${tableX}px, ${tableY}px)`;

                if (gameState.showGuide !== false) {
                    guide.style.display = 'block'; guide.src = gameState.image;
                    guide.style.width = gameState.width + 'px'; guide.style.height = gameState.height + 'px';
                    guide.style.left = (2000 - gameState.width / 2) + 'px'; guide.style.top = (2000 - gameState.height / 2) + 'px';
                } else {
                    guide.style.display = 'none';
                }
                
                document.querySelectorAll('.piece').forEach(el => el.remove());
                for (let id in gameState.pieces) updatePieceDOM(id);
            } else {
                panel.className = 'waiting';
                
                if (isHost) document.getElementById('setup-section').style.display = 'block';
                else document.getElementById('setup-section').style.display = 'none';
                
                document.getElementById('playing-section').style.display = 'none';
                if (!currentRoomId) document.getElementById('room-section').style.display = 'block';
                
                document.querySelectorAll('.piece, .remote-cursor').forEach(el => el.remove());
                guide.removeAttribute('src'); guide.style.display = 'none';
                document.getElementById('file-name').textContent = 'Файл не выбран'; document.getElementById('imageInput').value = '';
            }
        }

        function drawPuzzleEdge(ctx, x1, y1, x2, y2, sign, tabSize) {
            if (sign === 0) { ctx.lineTo(x2, y2); return; }
            const dx = x2 - x1, dy = y2 - y1; const len = Math.hypot(dx, dy); const angle = Math.atan2(dy, dx);
            ctx.save(); ctx.translate(x1, y1); ctx.rotate(angle);
            const mid = len / 2; const ts = tabSize;
            ctx.lineTo(mid - ts * 0.8, 0);
            ctx.bezierCurveTo(mid - ts * 0.5, 0, mid - ts * 0.4, sign * ts * 0.3, mid - ts * 0.4, sign * ts * 0.5);
            ctx.bezierCurveTo(mid - ts * 0.4, sign * ts * 1.1, mid + ts * 0.4, sign * ts * 1.1, mid + ts * 0.4, sign * ts * 0.5);
            ctx.bezierCurveTo(mid + ts * 0.4, sign * ts * 0.3, mid + ts * 0.5, 0, mid + ts * 0.8, 0);
            ctx.lineTo(len, 0); ctx.restore();
        }

        function updatePieceDOM(id) {
            let el = document.getElementById('piece-' + id);
            const piece = gameState.pieces[id];
            const pw = gameState.width / gameState.cols, ph = gameState.height / gameState.rows;
            const tabSize = Math.min(pw, ph) * 0.25;
            
            if (!el) {
                el = document.createElement('canvas'); el.id = 'piece-' + id; el.className = 'piece';
                el.width = pw + 2 * tabSize; el.height = ph + 2 * tabSize;
                
                const ctx = el.getContext('2d'); const c = piece.c, r = piece.r;
                const topTab = (r === 0) ? 0 : -gameState.tabs.h[r-1][c];
                const bottomTab = (r === gameState.rows - 1) ? 0 : gameState.tabs.h[r][c];
                const leftTab = (c === 0) ? 0 : -gameState.tabs.v[r][c-1];
                const rightTab = (c === gameState.cols - 1) ? 0 : gameState.tabs.v[r][c];
                
                ctx.beginPath(); ctx.moveTo(tabSize, tabSize);
                drawPuzzleEdge(ctx, tabSize, tabSize, tabSize + pw, tabSize, topTab, tabSize);
                drawPuzzleEdge(ctx, tabSize + pw, tabSize, tabSize + pw, tabSize + ph, rightTab, tabSize);
                drawPuzzleEdge(ctx, tabSize + pw, tabSize + ph, tabSize, tabSize + ph, bottomTab, tabSize);
                drawPuzzleEdge(ctx, tabSize, tabSize + ph, tabSize, tabSize, leftTab, tabSize);
                ctx.closePath(); ctx.clip();
                ctx.drawImage(cachedImage, -c * pw + tabSize, -r * ph + tabSize, gameState.width, gameState.height);
                
                el.onpointerdown = (e) => {
                    e.preventDefault();
                    if (e.button === 1) detachPiece(id);
                    else startDraggingPiece(e, id);
                };
                document.getElementById('table').appendChild(el);
            }
            
            el.style.left = (piece.x - tabSize) + 'px'; el.style.top = (piece.y - tabSize) + 'px';
            el.style.zIndex = piece.group + 10;
        }

        function detachPiece(id) {
            if (gameState.status !== 'playing') return;
            const piece = gameState.pieces[id];
            
            let isGrouped = false;
            for (let k in gameState.pieces) {
                if (k != id && gameState.pieces[k].group === piece.group) { isGrouped = true; break; }
            }
            
            if (isGrouped) {
                playPickSound();
                piece.group = piece.id; 
                piece.x += 30; piece.y += 30;
                updatePieceDOM(id);
                send({ type: 'updatePieces', pieces: [piece] }); 
            }
        }

        document.getElementById('table-wrapper').onpointerdown = (e) => {
            if (e.target.id === 'table-wrapper' || e.target.id === 'table' || e.target.id === 'guide') {
                isPanning = true; dragStartX = e.clientX; dragStartY = e.clientY; document.body.setPointerCapture(e.pointerId);
            }
        };

        function startDraggingPiece(e, id) {
            if (gameState.status !== 'playing') return;
            playPickSound(); 
            const piece = gameState.pieces[id];
            draggingGroup = piece.group; dragStartX = e.clientX; dragStartY = e.clientY;
            initialPiecePositions = {};

            for (let key in gameState.pieces) {
                if (gameState.pieces[key].group === draggingGroup) {
                    initialPiecePositions[key] = { x: gameState.pieces[key].x, y: gameState.pieces[key].y };
                    document.getElementById('piece-'+key).classList.add('dragging');
                }
            }
            document.body.setPointerCapture(e.pointerId);
        }

        document.addEventListener('pointermove', (e) => {
            const dx = e.clientX - dragStartX; const dy = e.clientY - dragStartY;

            if (isPanning) {
                tableX += dx; tableY += dy; dragStartX = e.clientX; dragStartY = e.clientY;
                document.getElementById('table').style.transform = `translate(${tableX}px, ${tableY}px)`;
            } 
            else if (draggingGroup !== null) {
                for (let key in initialPiecePositions) {
                    gameState.pieces[key].x = initialPiecePositions[key].x + dx;
                    gameState.pieces[key].y = initialPiecePositions[key].y + dy;
                    updatePieceDOM(key);
                }
                const now = Date.now();
                if (now - lastSendTime > 50) { sendGroupUpdate(); lastSendTime = now; }
            }

            // Синхронизация курсоров
            if (gameState.status === 'playing' && currentRoomId) {
                const now = Date.now();
                if (now - lastCursorSend > 40) { 
                    const localX = e.clientX - tableX; const localY = e.clientY - tableY;
                    if (isHost) {
                        broadcastExcept('host', { type: 'cursorUpdate', id: 'host', color: myColor, x: localX, y: localY });
                    } else if (hostConnection && hostConnection.open) {
                        hostConnection.send({ type: 'cursorMove', x: localX, y: localY });
                    }
                    lastCursorSend = now;
                }
            }
        });

        document.addEventListener('pointerup', (e) => {
            isPanning = false;
            if (draggingGroup !== null) {
                const pw = gameState.width / gameState.cols, ph = gameState.height / gameState.rows;
                const snapThreshold = 30;
                let snapped = false; let snapDx = 0, snapDy = 0; let targetGroup = null;

                for (let dragKey in initialPiecePositions) {
                    const dragPiece = gameState.pieces[dragKey];
                    for (let statKey in gameState.pieces) {
                        const statPiece = gameState.pieces[statKey];
                        if (dragPiece.group === statPiece.group) continue;
                        const colDiff = statPiece.c - dragPiece.c; const rowDiff = statPiece.r - dragPiece.r;

                        if (Math.abs(colDiff) + Math.abs(rowDiff) === 1) {
                            const idealDx = colDiff * pw; const idealDy = rowDiff * ph;
                            const actualDx = statPiece.x - dragPiece.x; const actualDy = statPiece.y - dragPiece.y;

                            if (Math.abs(actualDx - idealDx) < snapThreshold && Math.abs(actualDy - idealDy) < snapThreshold) {
                                snapDx = (statPiece.x - idealDx) - dragPiece.x; snapDy = (statPiece.y - idealDy) - dragPiece.y;
                                targetGroup = statPiece.group; snapped = true; break;
                            }
                        }
                    }
                    if (snapped) break;
                }

                if (snapped) {
                    playSnapSound(); 
                    for (let key in initialPiecePositions) {
                        gameState.pieces[key].x += snapDx; gameState.pieces[key].y += snapDy; gameState.pieces[key].group = targetGroup; 
                    }
                }

                sendGroupUpdate();

                for (let key in initialPiecePositions) {
                    const el = document.getElementById('piece-'+key);
                    el.classList.remove('dragging'); el.style.zIndex = gameState.pieces[key].group + 10;
                }

                draggingGroup = null; document.body.releasePointerCapture(e.pointerId);

                if (snapped) {
                    const uniqueGroups = new Set(Object.values(gameState.pieces).map(p => p.group));
                    if (uniqueGroups.size === 1) { setTimeout(() => { playWinSound(); alert('🎉 Пазл собран! 🎉'); }, 200); }
                }
            }
        });

        function sendGroupUpdate() { send({ type: 'updatePieces', pieces: Object.keys(initialPiecePositions).map(k => gameState.pieces[k]) }); }

    </script>
